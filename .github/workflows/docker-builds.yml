name: Build and Push Docker image to GHCR

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/docker-builds.yml'
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Grant write permission for packages (GHCR)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: . # Build context is the root directory
          file: ./Dockerfile.nightly
          push: true # Push the image to the registry
          tags: ghcr.io/${{ github.repository }}:nightly
          build-args: PYTORCH_TAG=2.11.0.dev20260109-cuda12.6-cudnn9-devel

  build-and-push-stable:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Grant write permission for packages (GHCR)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: . # Build context is the root directory
          file: ./Dockerfile
          push: true # Push the image to the registry
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: PYTORCH_TAG=2.9.1-cuda12.6-cudnn9-devel
